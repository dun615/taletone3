  <main style="font-family: Pretendard, 'Noto Sans KR', system-ui, sans-serif; padding: 48px 22px; line-height: 1.7; color: #141C30; background: #eef6f4;">
    <h1 style="margin:0 0 12px; font-size: clamp(34px, 8vw, 72px); line-height:.95;">Story Types | TALETONE MUSIC — 자체 IP와 스토리텔링</h1>
    <p style="margin:0 0 10px; font-weight:700;">A tale becomes a tone. A tone becomes music.</p>
    <p style="margin:0 0 20px; max-width: 780px;">자체 IP를 기획해 본 팀은, 클라이언트의 IP를 더 깊이 읽습니다.</p>
    <section aria-label="Story Types" style="margin:0 0 28px; max-width: 940px;">
      <h2 style="font-size:22px; margin:0 0 8px;">Story Types</h2>
      <p style="margin:0 0 10px;">서브컬쳐 게임: OST, 캐릭터 테마송, 이벤트 곡, PV/트레일러 음악, BGM</p>
      <p style="margin:0 0 10px;">버튜버·인플루언서·아티스트: 오리지널 송, 데뷔곡, 유닛곡, 세계관 곡</p>
      <p style="margin:0 0 10px;">애니메이션·웹툰·웹소설 IP: 오프닝, 엔딩, 삽입곡, 캐릭터 송, 프로모션 음악</p>
      <p style="margin:12px 0 0;">soraniwa와 TALETONES는 TALETONE MUSIC이 직접 기획하는 자체 IP 프로젝트입니다.</p>
    </section>
