    <h1 style="margin:0 0 12px; font-size: clamp(34px, 8vw, 72px); line-height:.95;">TALETONE MUSIC</h1>
    <p style="margin:0 0 10px; font-weight:700;">A tale becomes a tone. A tone becomes music.</p>
    <p style="margin:0 0 20px; max-width: 760px;">세계관이 있는 IP를 음악으로 확장하는 스토리 기반 음악 프로덕션</p>
    <p style="margin:0 0 28px; max-width: 760px;">서브컬쳐 게임 / 버튜버·인플루언서·아티스트 / 애니메이션·웹툰·웹소설 IP</p>
    <section aria-label="TALETONE MUSIC Method" style="margin:0 0 28px; max-width: 860px;">
      <h2 style="font-size:22px; margin:0 0 8px;">TALE → TONE → MUSIC</h2>
      <p style="margin:0;">레퍼런스만 따라가지 않습니다. 이야기를 읽고, 톤을 설계하고, 작곡·편곡·디렉팅·믹스·마스터로 완성합니다.</p>
    </section>
