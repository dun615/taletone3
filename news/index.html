        <h3 style="margin:0 0 4px;">2026.06.27 · TALETONE, 첫 이야기를 시작합니다</h3>
        <p style="margin:0;">TALETONE MUSIC이 첫걸음을 내디뎠습니다. 이야기와 음악, 그리고 우리가 만들고 싶은 세계를 하나의 이름 아래에 모았습니다.</p>
      </article>
      <article>
        <h3 style="margin:0 0 4px;">2026.06.11 · STELLIVE Universe ‘마음악보’ 발매</h3>
        <p style="margin:0;">TALETONE이 음악 제작으로 함께한 STELLIVE Universe의 단체 오리지널 싱글 ‘마음악보’가 발매되었습니다.</p>
