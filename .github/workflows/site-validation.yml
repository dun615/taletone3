name: Site validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Validate production files
        run: node .github/scripts/validate-site.mjs
      - name: Validate runtime performance budgets
        run: node .github/scripts/validate-runtime-performance.mjs
